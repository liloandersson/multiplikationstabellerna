<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplikationstränaren 1-9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f9ff;
        }
        .card {
            transition: transform 0.2s;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-pop {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md card">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 mb-2">Gångertabellen</h1>
            <p class="text-gray-500">Träna på tabellerna 1-9</p>
        </div>

        <!-- Stats -->
        <div class="flex justify-between mb-6 text-sm font-semibold">
            <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full">
                Rätt: <span id="score-correct">0</span>
            </div>
            <div class="bg-red-100 text-red-700 px-4 py-2 rounded-full">
                Fel: <span id="score-wrong">0</span>
            </div>
        </div>

        <!-- Question Area -->
        <div id="question-box" class="text-center py-10 bg-blue-50 rounded-2xl mb-6">
            <div class="text-5xl font-bold text-gray-800 tracking-wider">
                <span id="num1">?</span> × <span id="num2">?</span> = ?
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex flex-col gap-4">
            <input type="number" id="answer-input" 
                   class="w-full text-center text-3xl p-4 border-2 border-blue-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors"
                   placeholder="Svar..."
                   inputmode="numeric">
            
            <button id="check-btn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg transform active:scale-95 transition-all">
                Svara
            </button>
        </div>

        <!-- Message -->
        <div id="feedback-msg" class="text-center mt-6 font-semibold h-6 opacity-0 transition-opacity">
            Bra jobbat!
        </div>

        <!-- Reset -->
        <div class="text-center mt-8">
            <button id="reset-btn" class="text-gray-400 hover:text-gray-600 text-sm underline">
                Nollställ poäng
            </button>
        </div>
    </div>

    <script>
        // State
        let num1, num2, correctAnswer;
        let scoreCorrect = 0;
        let scoreWrong = 0;

        // Elements
        const num1El = document.getElementById('num1');
        const num2El = document.getElementById('num2');
        const inputEl = document.getElementById('answer-input');
        const checkBtn = document.getElementById('check-btn');
        const feedbackEl = document.getElementById('feedback-msg');
        const correctScoreEl = document.getElementById('score-correct');
        const wrongScoreEl = document.getElementById('score-wrong');
        const containerEl = document.getElementById('game-container');
        const resetBtn = document.getElementById('reset-btn');

        // Functions
        function generateQuestion() {
            num1 = Math.floor(Math.random() * 9) + 1;
            num2 = Math.floor(Math.random() * 9) + 1;
            correctAnswer = num1 * num2;
            
            num1El.textContent = num1;
            num2El.textContent = num2;
            inputEl.value = '';
            inputEl.focus();
        }

        function showFeedback(text, isCorrect) {
            feedbackEl.textContent = text;
            feedbackEl.className = `text-center mt-6 font-semibold h-6 opacity-100 ${isCorrect ? 'text-green-500' : 'text-red-500'}`;
            
            if (isCorrect) {
                containerEl.classList.add('correct-pop');
                setTimeout(() => containerEl.classList.remove('correct-pop'), 300);
            } else {
                containerEl.classList.add('shake');
                setTimeout(() => containerEl.classList.remove('shake'), 500);
            }
        }

        function checkAnswer() {
            const userAnswer = parseInt(inputEl.value);
            
            if (isNaN(userAnswer)) return;

            if (userAnswer === correctAnswer) {
                scoreCorrect++;
                correctScoreEl.textContent = scoreCorrect;
                showFeedback('Helt rätt! ✨', true);
                setTimeout(generateQuestion, 1000);
            } else {
                scoreWrong++;
                wrongScoreEl.textContent = scoreWrong;
                showFeedback(`Inte riktigt, prova igen!`, false);
                inputEl.value = '';
                inputEl.focus();
            }
        }

        // Event Listeners
        checkBtn.addEventListener('click', checkAnswer);
        
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        resetBtn.addEventListener('click', () => {
            scoreCorrect = 0;
            scoreWrong = 0;
            correctScoreEl.textContent = '0';
            wrongScoreEl.textContent = '0';
            feedbackEl.style.opacity = '0';
            generateQuestion();
        });

        // Initialize
        window.onload = generateQuestion;
    </script>
</body>
</html>
